name: Build Desktop (Windows & macOS)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: Hogrin-Windows
          - os: macos-latest
            artifact_name: Hogrin-macOS

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.2'
        modules: 'qtnetworkauth qt5compat' # Додаткові модулі, якщо треба

    - name: Install Ninja (Windows)
      if: matrix.os == 'windows-latest'
      run: choco install ninja

    - name: Install Ninja (macOS)
      if: matrix.os == 'macos-latest'
      run: brew install ninja

    - name: Build and Deploy
      run: |
        mkdir build-release
        cd build-release
        cmake -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=AppDist ..
        ninja install

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: build-release/AppDist/
