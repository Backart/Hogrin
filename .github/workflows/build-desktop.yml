name: Build macOS & Linux

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Ninja
        run: |
          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            brew install ninja
          else
            sudo apt-get update
            sudo apt-get install -y ninja-build libgl1-mesa-dev libxkbcommon-dev
          fi

      - name: Setup Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.2'
          modules: 'qtnetworkauth qt5compat'
          cache: false

      - name: Build Project
        run: |
          cmake -G Ninja -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=dist
          cmake --build build --target install

      - name: Package macOS (DMG)
        if: matrix.os == 'macos-latest'
        run: |
          macdeployqt dist/appHogrin.app -qmldir=src/ui/qml -dmg
          mv dist/appHogrin.dmg Hogrin-macOS.dmg

      - name: Upload Artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Hogrin-macOS
          path: Hogrin-macOS.dmg

      - name: Upload Artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Hogrin-Linux
          path: dist/
