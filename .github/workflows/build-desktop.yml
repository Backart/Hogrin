name: Build macOS & Linux

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Qt & Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aqtinstall
        
        if [ "${{ matrix.os }}" = "macos-latest" ]; then
          # Для Mac (M1/M2) використовуємо mac_arm64
          python -m aqt install-qt mac desktop 6.8.2 mac_arm64 -m qt5compat qtnetworkauth
          echo "QT_ROOT=$(pwd)/Qt/6.8.2/macos" >> $GITHUB_ENV
          echo "$(pwd)/Qt/6.8.2/macos/bin" >> $GITHUB_PATH
        else
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev ninja-build
          # Для Linux стандарт gcc_64
          python -m aqt install-qt linux desktop 6.8.2 gcc_64 -m qt5compat qtnetworkauth
          echo "QT_ROOT=$(pwd)/Qt/6.8.2/gcc_64" >> $GITHUB_ENV
          echo "$(pwd)/Qt/6.8.2/gcc_64/bin" >> $GITHUB_PATH
        fi

    - name: Install Ninja (macOS)
      if: matrix.os == 'macos-latest'
      run: brew install ninja

    - name: Build
      run: |
        mkdir build-release
        cd build-release
        cmake -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=${{ env.QT_ROOT }} -DCMAKE_INSTALL_PREFIX=AppDist ..
        ninja install

    - name: Package macOS DMG
      if: matrix.os == 'macos-latest'
      run: |
        cd build-release
        # Додаємо шлях до бінарників Qt в PATH явно для macdeployqt
        export PATH=${{ env.QT_ROOT }}/bin:$PATH
        macdeployqt AppDist/appHogrin.app -qmldir=../src/ui/qml -dmg
        mv AppDist/appHogrin.dmg ../Hogrin-macOS.dmg

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Hogrin-${{ matrix.os }}
        path: |
          Hogrin-macOS.dmg
          build-release/AppDist/
